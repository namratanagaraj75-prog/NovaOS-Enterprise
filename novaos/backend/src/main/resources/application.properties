# Server Port Configuration
server.port=8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB

# Optional local environment files. OS environment variables still take precedence.
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]

# Resend email configuration
nova.resend.api-key=${RESEND_API_KEY:}
nova.resend.from=${RESEND_FROM_EMAIL:${RESEND_FROM:}}
nova.resend.from-name=${RESEND_FROM_NAME:Nova HR}


# Google Gemini API Settings
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent

# JWT signing key
jwt.secret=${JWT_SECRET}

# MongoDB removed - Firestore is the only database

# Firebase Credentials Settings
# Put the real service account JSON at src/main/resources/firebase-service-account.json for local development.
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.database.url=${FIREBASE_DATABASE_URL}
firebase.private-key-id=${FIREBASE_PRIVATE_KEY_ID:}
firebase.private-key=${FIREBASE_PRIVATE_KEY:}
firebase.client-email=${FIREBASE_CLIENT_EMAIL:}
firebase.client-id=${FIREBASE_CLIENT_ID:}

logging.level.org.springframework.security=INFO

server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false
